interface:
  display_name: "Case Study Integration"
  short_description: "Select, compare, and integrate case studies, examples, analogies, counter-cases, comparison sets, and case dossiers without cherry-picking or overgeneralization."
  default_prompt: "Use case-study-integration to choose and integrate case studies for this chapter without overclaiming."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  confidentiality_gate: "required-before-external-lookup"
  lookup_consent_required: true
  private_payloads_external: "requires-explicit-consent"
  artifact_sensitivity: "research-work-product"
  external_lookup_allowed: "none"
  allowed_external_payloads: "none-without-user-directed-skill-switch"
