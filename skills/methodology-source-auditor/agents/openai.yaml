interface:
  display_name: "Methodology Source Auditor"
  short_description: "Evaluate source credibility, articles, books, reports, datasets, case studies, method, evidence quality, bias, generalizability, and source-claim support limits."
  default_prompt: "Use methodology-source-auditor to assess whether these sources are credible and what claims they can support."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  external_lookup_allowed: "conditional"
  confidentiality_gate: "required-before-external-lookup"
