interface:
  display_name: "Claim Evidence Ledger"
  short_description: "Extract major claims from a research draft and classify claim type, evidence status, citation need, confidence, overclaiming risk, and safer wording."
  default_prompt: "Use claim-evidence-ledger to extract the major claims in this draft and show what evidence each one needs."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  confidentiality_gate: "required-before-external-lookup"
  lookup_consent_required: true
  private_payloads_external: "requires-explicit-consent"
  artifact_sensitivity: "research-work-product"
  external_lookup_allowed: "route-only"
  allowed_external_payloads: "routing-targets-and-nonsensitive-summary-only"
