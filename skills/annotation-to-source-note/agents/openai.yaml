interface:
  display_name: "Annotation to Source Note"
  short_description: "Convert reference-manager notes, document highlights, manual annotations, excerpts, or reading notes (for example, Zotero notes or PDF highlights) into source-bound notes while preserving quote, paraphrase, summary, interpretation, citekey, metadata, and locator gaps."
  default_prompt: "Use annotation-to-source-note to convert these annotations into source-bound notes and flag missing metadata or locators."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  confidentiality_gate: "required-before-external-lookup"
  lookup_consent_required: true
  private_payloads_external: "requires-explicit-consent"
  artifact_sensitivity: "research-work-product"
  external_lookup_allowed: "conditional"
  allowed_external_payloads: "public-identifiers-search-terms-and-nonsensitive-short-summaries"
