interface:
  display_name: "Book Comps Verifier"
  short_description: "Verify comparable titles and positioning claims for research nonfiction proposals, press pitches, agent queries, grant applications, audience claims, market claims, timeliness claims, and publication positioning."
  default_prompt: "Use book-comps-verifier to verify these comparable titles and flag stale, mismatched, fabricated, or unverified positioning claims."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  confidentiality_gate: "required-before-external-lookup"
  lookup_consent_required: true
  private_payloads_external: "requires-explicit-consent"
  artifact_sensitivity: "research-work-product"
  external_lookup_allowed: "conditional"
  allowed_external_payloads: "public-identifiers-search-terms-and-nonsensitive-short-summaries"
