interface:
  display_name: "Argument Architecture"
  short_description: "Build a research book-level thesis tree with claims, warrants, evidence, assumptions, counterarguments, chapter sequence, and argumentative dependencies."
  default_prompt: "Use argument-architecture to build a thesis tree and chapter-level argument map for my book."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  external_lookup_allowed: "conditional"
  confidentiality_gate: "required-before-external-lookup"
