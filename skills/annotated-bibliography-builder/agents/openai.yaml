interface:
  display_name: "Annotated Bibliography Builder"
  short_description: "Create structured annotated bibliographies that summarize argument, method, evidence, relevance, limitations, key terms, and chapter placement for research book sources."
  default_prompt: "Use annotated-bibliography-builder to turn these sources into research annotations and chapter-use notes."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  external_lookup_allowed: "conditional"
  confidentiality_gate: "required-before-external-lookup"
