interface:
  display_name: "Rights Privacy Release Auditor"
  short_description: "Audit notes, research artifacts, manuscript exports, proposal materials, and shared files for privacy, copyright, quotation, license, secret, credential, local metadata, and release risks before external sharing."
  default_prompt: "Use rights-privacy-release-auditor to audit these materials for privacy, copyright, quotation, license, credential, and release risks."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  confidentiality_gate: "required-before-external-lookup"
  lookup_consent_required: true
  private_payloads_external: "requires-explicit-consent"
  artifact_sensitivity: "research-work-product"
  external_lookup_allowed: "conditional"
  allowed_external_payloads: "public-identifiers-search-terms-and-nonsensitive-short-summaries"
