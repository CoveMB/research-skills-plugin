interface:
  display_name: "Low-Load Research Companion"
  short_description: "Route mixed or unclear accessibility bottlenecks for dyslexic, dysorthographic, dictation-heavy, or reading-fatigued scholarly authors when no smaller accessibility skill clearly owns the task."
  default_prompt: "Use dyslexia-research-companion to route this mixed accessibility bottleneck and choose the smallest low-load first step without changing my meaning."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  external_lookup_allowed: "conditional"
  confidentiality_gate: "required-before-external-lookup"
