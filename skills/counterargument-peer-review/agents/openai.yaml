interface:
  display_name: "Counterargument Peer Review"
  short_description: "Run a research peer-review style critique with objections, rival explanations, missing literatures, positional blind spots, and thesis revisions."
  default_prompt: "Use counterargument-peer-review to challenge my thesis like a skeptical peer reviewer."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  external_lookup_allowed: "conditional"
  confidentiality_gate: "required-before-external-lookup"
