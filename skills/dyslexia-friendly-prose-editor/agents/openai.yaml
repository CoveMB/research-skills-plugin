interface:
  display_name: "Accessible Prose Repair"
  short_description: "Repair spelling, grammar, sentence boundaries, punctuation, and readability in existing scholarly prose for dyslexic or dysorthographic authors while preserving meaning, authorial voice, uncertainty, evidence limits, and a brief change summary."
  default_prompt: "Use dyslexia-friendly-prose-editor to repair spelling, grammar, punctuation, and sentence boundaries in this passage without changing my meaning or hiding evidence gaps."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  confidentiality_gate: "required-before-external-lookup"
  lookup_consent_required: true
  private_payloads_external: "requires-explicit-consent"
  artifact_sensitivity: "research-work-product"
  external_lookup_allowed: "route-only"
  allowed_external_payloads: "routing-targets-and-nonsensitive-summary-only"
