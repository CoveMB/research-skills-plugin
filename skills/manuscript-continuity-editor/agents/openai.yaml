interface:
  display_name: "Manuscript Continuity Editor"
  short_description: "Review multiple chapters or a whole manuscript for thesis coherence, repetition, contradictions, concept tracking, tone consistency, chapter order, and revision priorities."
  default_prompt: "Use manuscript-continuity-editor to review these chapters for coherence, repetition, contradictions, and structure."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  confidentiality_gate: "required-before-external-lookup"
  lookup_consent_required: true
  private_payloads_external: "requires-explicit-consent"
  artifact_sensitivity: "research-work-product"
  external_lookup_allowed: "none"
  allowed_external_payloads: "none-without-user-directed-skill-switch"
