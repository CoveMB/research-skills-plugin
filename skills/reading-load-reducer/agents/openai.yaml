interface:
  display_name: "Reading Load Reducer"
  short_description: "Reduce reading burden for scholarly work by turning dense articles, source excerpts, search results, bibliographies, chapter drafts, or long notes into skim-read-skip triage, close-reading targets, extraction priorities, evidence needs, and next actions without inventing source support."
  default_prompt: "Use reading-load-reducer to triage this dense material into read closely, skim, park, or skip, with evidence-use limits and next actions."
policy:
  allow_implicit_invocation: true
  task_type: "research-book-skill"
  data_access_level: "user-provided-or-public-metadata"
  confidentiality_gate: "required-before-external-lookup"
  lookup_consent_required: true
  private_payloads_external: "requires-explicit-consent"
  artifact_sensitivity: "research-work-product"
  external_lookup_allowed: "conditional"
  allowed_external_payloads: "public-identifiers-search-terms-and-nonsensitive-short-summaries"
